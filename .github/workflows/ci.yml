name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }} / ${{ matrix.compiler }})
    strategy:
      matrix:
        include:
          # x86_64 runners
          - os: ubuntu-latest
            compiler: gcc
            arch: x86_64
          - os: ubuntu-latest
            compiler: clang
            arch: x86_64
          - os: ubuntu-24.04
            compiler: gcc
            arch: x86_64
          - os: ubuntu-24.04
            compiler: clang
            arch: x86_64
          - os: ubuntu-22.04
            compiler: gcc
            arch: x86_64
          - os: ubuntu-22.04
            compiler: clang
            arch: x86_64
          # aarch64 runners
          - os: ubuntu-24.04-arm
            compiler: gcc
            arch: aarch64
          - os: ubuntu-24.04-arm
            compiler: clang
            arch: aarch64
          - os: ubuntu-22.04-arm
            compiler: gcc
            arch: aarch64
          - os: ubuntu-22.04-arm
            compiler: clang
            arch: aarch64
      fail-fast: false

    runs-on: ${{ matrix.os }}

    permissions:
      contents: read

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: true
        persist-credentials: false

    - name: Install compiler
      env:
        COMPILER: ${{ matrix.compiler }}
      run: |
        if [ "$COMPILER" = "clang" ]; then
          sudo apt-get update
          sudo apt-get install -y clang
        fi

    - name: Set compiler environment variable
      env:
        COMPILER: ${{ matrix.compiler }}
      run: |
        if [ "$COMPILER" = "gcc" ]; then
          echo "CC=gcc" >> "$GITHUB_ENV"
        else
          echo "CC=clang" >> "$GITHUB_ENV"
        fi

    - name: Build
      run: cargo build

    - name: Run tests
      run: cargo test

    - name: Build pure-rust
      run: cargo build --features=pure-rust

    - name: Run pure-rust tests
      run: cargo test --features=pure-rust

    - name: Build no-std
      run: cargo build --no-default-features

    - name: Run no-std tests
      run: cargo test --no-default-features

    - name: Build pure-rust no-std
      run: cargo build --no-default-features --features=pure-rust

    - name: Run pure-rust no-std tests
      run: cargo test --no-default-features --features=pure-rust

    - name: Run RAF tests
      run: cargo test --features=raf
